version: 1.17.{build}
build_cloud: WIN-LKR467JS4GL
image: Windows
platform:
- x86
- x64
- ARM64
configuration:
- "Release (Console)"
- "Release (WinMain)"
test: off
branches:
  only:
    - master
    - /v\d+\.\d+\.\d+/
skip_commits:
  files:
    - assets/*
    - '**/*.md'
    - '**/*.png'
install:
- cmd: git submodule -q update --init
- cmd: ./vcpkg/bootstrap-vcpkg.bat
- cmd: choco install vswhere
# Source: https://gist.github.com/nefarius/b60a498b0229b5cf0e338b7a39460b80
- ps: Setup-VS2022 $env:PLATFORM
before_build:
- ps: |
    $ver = if ($env:APPVEYOR_REPO_TAG -eq 'true') { $env:APPVEYOR_REPO_TAG_NAME -replace '^v' } else { $env:APPVEYOR_BUILD_VERSION }
    vpatch --stamp-version $ver --target-file ".\src\NefConUtil.rc" --resource.file-version --resource.product-version
build_script:
- ps: |
    for ($attempt = 1; $attempt -le 3; $attempt++) {
        msbuild "$env:APPVEYOR_BUILD_FOLDER\NefConUtil.sln" `
            /p:Configuration="$env:CONFIGURATION" `
            /p:Platform="$env:PLATFORM" `
            /m
        if ($LASTEXITCODE -eq 0) { return }
        if ($attempt -lt 3) {
            Write-Warning "Build attempt $attempt/3 failed (exit code $LASTEXITCODE), retrying in 15 seconds..."
            Start-Sleep -Seconds 15
        }
    }
    throw "Build failed after 3 attempts"
artifacts:
- path: bin\**\*.exe
  name: nefcon
deploy:
- provider: Environment
  name: BUILDBOT
  on:
    appveyor_repo_tag: true
